name: flutter_vpn_detector
description: A Flutter plugin to detect if the device is using a VPN connection. Supports Android, iOS, macOS, Windows, and Linux.
version: 0.1.0
homepage: https://github.com/tikoua/flutter_vpn_detector

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.tikoua.flutter_vpn_detector
        pluginClass: FlutterVpnDetectorPlugin
      ios:
        pluginClass: FlutterVpnDetectorPlugin
      macos:
        pluginClass: FlutterVpnDetectorPlugin
      windows:
        pluginClass: FlutterVpnDetectorPlugin
      linux:
        pluginClass: FlutterVpnDetectorPlugin

