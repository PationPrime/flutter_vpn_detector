name: vpn_checker
description: A Flutter plugin to detect if the device is using a VPN connection. Supports Android, iOS, macOS, Windows, and Linux.
version: 0.1.0
homepage: https://github.com/tikoua/vpn_checker

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.tikoua.vpn_checker
        pluginClass: VpnCheckerPlugin
      ios:
        pluginClass: VpnCheckerPlugin
      macos:
        pluginClass: VpnCheckerPlugin
      windows:
        pluginClass: VpnCheckerPlugin
      linux:
        pluginClass: VpnCheckerPlugin

